version: "3.9"

# =============================================================================
# SitePilot — Local Dev Stack (повний стек)
# Запуск: docker compose up -d
# З pgAdmin: docker compose --profile tools up -d
# =============================================================================

networks:
  sitepilot-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  pgadmin-data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: sitepilot-postgres
    restart: unless-stopped
    networks: [sitepilot-net]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       ${DB_NAME:-sitepilot}
      POSTGRES_USER:     ${DB_USER:-sitepilot}
      POSTGRES_PASSWORD: ${DB_PASS:-sitepilot_dev_pass}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
      - ./scripts/sitepilot_migration.sql:/docker-entrypoint-initdb.d/02-migration.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sitepilot} -d ${DB_NAME:-sitepilot}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: sitepilot-redis
    restart: unless-stopped
    networks: [sitepilot-net]
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASS:-redis_dev_pass} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-redis_dev_pass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: sitepilot-backend
    restart: unless-stopped
    networks: [sitepilot-net]
    ports:
      - "3001:3001"
    env_file: [./env/.env.local]
    environment:
      NODE_ENV:   development
      DB_HOST:    postgres
      DB_PORT:    5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ../backend/src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    container_name: sitepilot-frontend
    restart: unless-stopped
    networks: [sitepilot-net]
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:             development
      NEXT_PUBLIC_API_URL:  http://localhost:3001
    volumes:
      - ../frontend/src:/app/src:ro
      - ../frontend/public:/app/public:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sitepilot-pgadmin
    restart: unless-stopped
    networks: [sitepilot-net]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@sitepilot.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./scripts/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [tools]
